# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

require:
  - ./lib/rubocop/cop/custom/no_unless
  - ./lib/rubocop/cop/custom/no_trailing_conditional

# Overwrite or add rules to create your own house style
#
# # Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
# Layout/SpaceInsideArrayLiteralBrackets:
#   Enabled: false

# Disable the built-in cop that pushes toward `unless`
Style/NegatedIf:
  Enabled: false

# Prefer `if !condition` over `unless condition`
Custom/NoUnless:
  Enabled: true

# Prefer block form over trailing conditionals
Custom/NoTrailingConditional:
  Enabled: true

# Prefer `raise ServiceError.new(message)` over `raise ServiceError, message`
Style/RaiseArgs:
  Enabled: true
  EnforcedStyle: compact

# Require empty lines inside class bodies
Layout/EmptyLinesAroundClassBody:
  Enabled: true
  EnforcedStyle: empty_lines

# No empty lines inside module bodies (explicit preference over default)
Layout/EmptyLinesAroundModuleBody:
  Enabled: true
  EnforcedStyle: no_empty_lines

# Prefer multi-line empty method definitions over single-line
Style/EmptyMethod:
  Enabled: true
  EnforcedStyle: expanded
